<script>
    window.onload = function() {
      const apiKey = localStorage.getItem('sh_free_keepa_key');
      if (!apiKey) openSettings();
    };

    function openSettings() {
      const currentKey = localStorage.getItem('sh_free_keepa_key');
      if(currentKey) document.getElementById('apiKeyInput').value = currentKey;
      document.getElementById('settingsModal').classList.remove('hidden');
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.add('hidden');
    }

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) return alert("APIキーを入力してください！");
      localStorage.setItem('sh_free_keepa_key', key);
      alert("✅ 設定を保存しました！");
      closeSettings();
    }

    async function searchKeepa() {
      const apiKey = localStorage.getItem('sh_free_keepa_key');
      if (!apiKey) {
        alert("先に右上の歯車マークからKeepa APIキーを設定してください。");
        openSettings();
        return;
      }

      let query = document.getElementById('searchInput').value.trim();
      if (!query) {
        alert("検索キーワードを入力してください。");
        return;
      }

      // 🚨 テスト用のアラートは完全に削除済み！すぐに画面を切り替える！
      const resultArea = document.getElementById('resultArea');
      resultArea.classList.remove('hidden');
      resultArea.innerHTML = `<div class="text-center py-6"><i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i><p class="mt-3 text-gray-600 font-bold">Keepaからデータを取得中...</p></div>`;

      try {
        let asin = query;
        const isAsin = /^[a-zA-Z0-9]{10}$/.test(query);

        if (!isAsin) {
           const searchRes = await fetch(`https://api.keepa.com/search?key=${apiKey}&domain=9&type=product&term=${encodeURIComponent(query)}`);
           const searchData = await searchRes.json();
           
           if (!searchData.products || searchData.products.length === 0) {
               resultArea.innerHTML = `<p class="text-red-500 text-center font-bold py-4">商品が見つかりませんでした。</p>`;
               return;
           }
           asin = searchData.products[0].asin; 
        }

        const detailRes = await fetch(`https://api.keepa.com/product?key=${apiKey}&domain=9&asin=${asin}&stats=90`);
        const detailData = await detailRes.json();

        if (detailData.error) {
            resultArea.innerHTML = `<p class="text-red-500 text-center font-bold py-4">APIエラー: ${detailData.error.message}</p>`;
            return;
        }

        if (!detailData.products || detailData.products.length === 0) {
            resultArea.innerHTML = `<p class="text-red-500 text-center font-bold py-4">該当するデータがありません。</p>`;
            return;
        }

        const product = detailData.products[0];
        const title = product.title || "商品名不明";
        const keepaUrl = `https://keepa.com/#!product/9-${asin}`;
        const amzUrl = `https://www.amazon.co.jp/dp/${asin}`;
        
        const imgName = product.imagesCSV ? product.imagesCSV.split(',')[0] : '';
        const imgUrl = imgName ? `https://m.media-amazon.com/images/I/${imgName}` : 'https://via.placeholder.com/150';

        const graphUrl = `https://graph.keepa.com/pricehistory.png?asin=${asin}&domain=9&salesrank=1&new=1&used=1&range=90`;

        resultArea.innerHTML = `
          <div class="flex items-start gap-4 mb-4">
            <img src="${imgUrl}" class="w-24 h-24 object-contain rounded border p-1 bg-white" alt="商品画像">
            <div>
              <p class="text-sm font-bold text-gray-800 leading-snug line-clamp-3">${title}</p>
              <div class="mt-2">
                <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded">ASIN: ${asin}</span>
              </div>
            </div>
          </div>
          
          <div class="mb-4">
             <img src="${graphUrl}" class="w-full rounded border border-gray-300 shadow-sm" alt="Keepa波形">
          </div>
          
          <div class="grid grid-cols-2 gap-3">
            <a href="${keepaUrl}" target="_blank" class="flex justify-center items-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition">
              <i class="fas fa-chart-line mr-2"></i> Keepa
            </a>
            <a href="${amzUrl}" target="_blank" class="flex justify-center items-center bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg shadow-md transition">
              <i class="fab fa-amazon mr-2"></i> Amazon
            </a>
          </div>
        `;

      } catch (error) {
        resultArea.innerHTML = `<p class="text-red-500 text-center font-bold py-4">通信エラーが発生しました。<br>APIキーが正しいか確認してください。</p>`;
      }
    }

    function goToProVersion() {
      window.open('https://your-sales-page-url.com', '_blank');
    }
  </script>
