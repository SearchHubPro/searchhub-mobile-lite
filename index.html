<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SearchHub mobile</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SearchHub">
  
  <link rel="apple-touch-icon" href="https://i.ibb.co/239pGpn0/Gemini-Generated-Image-jxewdqjxewdqjxew-1.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { background-color: #f3f4f6; font-family: 'Helvetica Neue', Arial, sans-serif; padding-bottom: 80px; }
    .header-bg { background-color: #1c355e; padding-top: max(12px, env(safe-area-inset-top)); }
    .calc-bg { background-color: #333333; }
    .calc-input { background-color: #ffffff; color: #000000; text-align: right; font-weight: bold; border-radius: 4px; padding: 4px 8px; width: 120px; outline: none; }
    .btn-green { background-color: #4b9e6c; }
    .btn-keepa { background-color: #55a676; }
    .btn-search { background-color: #3f51b5; }
    .btn-amz { background-color: #f7941d; }
  </style>
</head>
<body>

  <div id="splashScreen" class="fixed inset-0 z-[9999] bg-black flex items-center justify-center transition-all duration-500 ease-out">
    <img src="https://i.ibb.co/gLNftCyR/Chat-GPT-Image-2026-5-25-20-55-41.png" 
         class="absolute inset-0 w-full h-full object-cover" alt="Splash Logo">
    <div class="absolute bottom-16 text-white text-sm font-bold tracking-widest animate-pulse drop-shadow-lg">
      SYSTEM LOADING...
    </div>
  </div>

  <div class="header-bg text-white flex justify-between items-center px-4 py-3 sticky top-0 z-50 shadow-md">
    <button onclick="location.reload()" class="text-xl p-2 rounded-full active:bg-blue-900">
      <i class="fas fa-sync-alt"></i>
    </button>
    <div class="text-center">
      <h1 class="text-base font-bold tracking-wider">SearchHub mobile</h1>
      <p class="text-[10px] text-gray-300" id="lastUpdated">最終更新: --</p>
    </div>
    <button onclick="openSettings()" class="text-xl p-2 rounded-full active:bg-blue-900">
      <i class="fas fa-cog"></i>
    </button>
  </div>

  <div class="p-4 bg-white border-b border-gray-200 flex gap-2">
    <input type="text" id="searchInput" placeholder="ASINや型番を入力..." 
           class="flex-1 p-3 border border-gray-300 rounded-lg text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    <button onclick="searchKeepa()" class="btn-green text-white font-bold py-3 px-5 rounded-lg active:opacity-80">
      解析
    </button>
  </div>

  <div id="resultArea" class="hidden p-4">
    
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 mb-4 flex gap-3 items-center">
      <div class="w-20 h-20 flex-shrink-0 border border-gray-100 rounded-lg p-1 bg-white flex items-center justify-center">
        <img id="itemImg" src="" class="max-w-full max-h-full object-contain" alt="商品画像">
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[11px] text-gray-800 font-bold mb-0.5 truncate" id="itemModel">型番: -</div>
        <div class="flex items-center gap-1 mb-2">
          <span class="text-[11px] font-bold text-gray-600">ASIN:</span>
          <span class="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-[11px] font-bold" id="itemAsin">B000000000</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex gap-1">
            <span class="border border-orange-500 text-orange-500 text-[10px] font-bold px-1.5 py-0.5 rounded">SRランク</span>
            <span class="bg-green-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded">標準</span>
          </div>
          <button class="bg-[#d9534f] text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">規制確認</button>
        </div>
      </div>
    </div>

    <div class="flex gap-3 mb-4">
      <div class="flex-1 bg-[#f0f4ff] border border-blue-100 rounded-xl p-3 text-center shadow-sm">
        <div class="text-[11px] text-[#4a72b2] font-bold mb-1">中古平均(90)</div>
        <div class="text-xl text-[#2c4c8f] font-bold" id="priceAvg">¥0</div>
      </div>
      <div class="flex-1 bg-[#fff0f4] border border-red-100 rounded-xl p-3 text-center shadow-sm">
        <div class="text-[11px] text-[#b24a5e] font-bold mb-1">中古最安値</div>
        <div class="text-xl text-[#b52a45] font-bold" id="priceLowest">¥0</div>
      </div>
    </div>

    <div class="calc-bg rounded-xl shadow-md p-4 mb-4 text-white text-sm font-bold">
      <div class="flex justify-between items-center mb-3">
        <span>仕入れ値</span>
        <input type="number" id="calcBuy" class="calc-input" value="0" oninput="calculateProfit()">
      </div>
      <div class="flex justify-between items-center mb-3">
        <span>経費/送料</span>
        <input type="number" id="calcExp" class="calc-input" value="0" oninput="calculateProfit()">
      </div>
      <div class="flex justify-between items-center mb-4">
        <span>販売価格</span>
        <input type="number" id="calcSell" class="calc-input" value="0" oninput="calculateProfit()">
      </div>
      
      <div class="border-t border-gray-500 pt-3 pb-1 flex justify-between text-gray-400 text-xs">
        <span>販売手数料 (10%)</span>
        <span id="calcFee">-¥0</span>
      </div>
      <div class="pb-3 border-b border-gray-500 flex justify-between text-gray-400 text-xs mb-3">
        <span>FBA手数料</span>
        <span>-¥430</span>
      </div>
      
      <div class="flex justify-between items-center mb-1 text-blue-300">
        <span>入金目安</span>
        <span class="text-lg" id="calcDeposit">¥0</span>
      </div>
      <div class="flex justify-between items-center text-[#4b9e6c]">
        <span>想定利益</span>
        <span class="text-lg" id="calcProfit">¥0 (0%)</span>
      </div>
    </div>

    <div class="bg-[#243c5a] text-white text-center py-3 rounded-xl shadow-md font-bold text-sm cursor-pointer hover:bg-blue-900 transition mb-4" onclick="goToProVersion()">
      🚀 販売管理sheetへ仕入れ登録
    </div>

    <div class="flex gap-2">
      <a id="linkKeepa" href="#" target="_blank" class="flex-1 flex justify-center items-center btn-keepa text-white font-bold py-2.5 rounded-lg shadow-sm text-sm">
        Keepa
      </a>
      <button onclick="searchAmazonKeyword()" class="flex-1 flex justify-center items-center btn-search text-white font-bold py-2.5 rounded-lg shadow-sm text-sm">
        検索
      </button>
      <a id="linkAmz" href="#" target="_blank" class="flex-1 flex justify-center items-center btn-amz text-white font-bold py-2.5 rounded-lg shadow-sm text-sm">
        Amazon
      </a>
    </div>
  </div>

  <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex justify-center items-center px-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6">
      <h2 class="text-xl font-bold mb-4 text-gray-800"><i class="fas fa-key text-yellow-500 mr-2"></i>初期設定</h2>
      <p class="text-sm text-gray-600 mb-4">ご利用にはご自身のKeepa APIキーが必要です。</p>
      <input type="text" id="apiKeyInput" placeholder="Keepa APIキーを入力" class="w-full p-3 border border-gray-300 rounded-lg mb-6">
      <div class="flex justify-end gap-3">
        <button onclick="closeSettings()" class="px-4 py-2 bg-gray-200 font-bold rounded-lg">キャンセル</button>
        <button onclick="saveApiKey()" class="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg">保存</button>
      </div>
    </div>
  </div>

  <script>
    const KEEPA_DOMAIN = 5; 

    window.onload = function() {
      const now = new Date();
      document.getElementById('lastUpdated').innerText = `最終更新: ${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      
      setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.visibility = 'hidden'; }, 500);
      }, 1200);

      if (!localStorage.getItem('sh_free_keepa_key')) {
        setTimeout(openSettings, 1300);
      }
    };

    function openSettings() {
      const currentKey = localStorage.getItem('sh_free_keepa_key');
      if(currentKey) document.getElementById('apiKeyInput').value = currentKey;
      document.getElementById('settingsModal').classList.remove('hidden');
    }

    function closeSettings() { 
      document.getElementById('settingsModal').classList.add('hidden'); 
    }

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) return alert("APIキーを入力してください！");
      localStorage.setItem('sh_free_keepa_key', key);
      closeSettings();
    }

    function calculateProfit() {
      const buy = Number(document.getElementById('calcBuy').value) || 0;
      const exp = Number(document.getElementById('calcExp').value) || 0;
      const sell = Number(document.getElementById('calcSell').value) || 0;
      
      const fee = Math.floor(sell * 0.10);
      const fba = 430; 
      
      const deposit = sell - fee - fba;
      const profit = deposit - buy - exp;
      const margin = sell > 0 ? Math.floor((profit / sell) * 100) : 0;

      document.getElementById('calcFee').innerText = `-¥${fee.toLocaleString()}`;
      document.getElementById('calcDeposit').innerText = `¥${deposit.toLocaleString()}`;
      document.getElementById('calcProfit').innerText = `¥${profit.toLocaleString()} (${margin}%)`;
      
      document.getElementById('calcProfit').className = profit < 0 ? "text-lg text-red-500 font-bold" : "text-lg text-[#4b9e6c] font-bold";
    }

    // 🚨 GoogleのWeb検索で「〇〇 amazon」を検索するように変更
    function searchAmazonKeyword() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return alert("検索キーワードを入力してください。");
      window.open(`https://www.google.com/search?q=${encodeURIComponent(query + ' amazon')}`, '_blank');
    }

    async function searchKeepa() {
      const apiKey = localStorage.getItem('sh_free_keepa_key');
      if (!apiKey) return openSettings();

      let query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      const resultArea = document.getElementById('resultArea');
      resultArea.classList.add('hidden');

      try {
        let asin = query;
        const isAsin = /^[a-zA-Z0-9]{10}$/.test(query);

        if (!isAsin) {
           const searchRes = await fetch(`https://api.keepa.com/search?key=${apiKey}&domain=${KEEPA_DOMAIN}&type=product&term=${encodeURIComponent(query)}`);
           const searchData = await searchRes.json();
           if (!searchData.products || searchData.products.length === 0) return alert("見つかりませんでした。");
           asin = searchData.products[0].asin; 
        }

        const detailRes = await fetch(`https://api.keepa.com/product?key=${apiKey}&domain=${KEEPA_DOMAIN}&asin=${asin}&stats=90`);
        const detailData = await detailRes.json();
        if (!detailData.products || detailData.products.length === 0) return alert("データなし。");

        const product = detailData.products[0];
        
        document.getElementById('itemAsin').innerText = asin;

        // 🚨 Keepaから「型番（モデル名）」を取得して表示。無ければタイトルの先頭を表示
        let modelStr = product.model;
        if (!modelStr) {
          modelStr = product.title ? product.title.substring(0, 30) + '...' : '-';
        }
        document.getElementById('itemModel').innerText = `型番: ${modelStr}`;
        
        let imgName = "";
        if (product.imagesCSV) {
          imgName = product.imagesCSV.split(',')[0].trim();
        } else if (product.images && product.images.length > 0) {
          imgName = product.images[0].l || product.images[0].m || product.images[0].s || "";
        }
        document.getElementById('itemImg').src = imgName ? `https://images-na.ssl-images-amazon.com/images/I/${imgName}` : 'https://via.placeholder.com/150?text=No+Image';

        let usedAvg = 0; let usedLowest = 0;
        if (product.stats) {
          if (product.stats.avg90 && product.stats.avg90[2] !== -1) usedAvg = product.stats.avg90[2];
          if (product.stats.current && product.stats.current[2] !== -1) usedLowest = product.stats.current[2];
        }

        document.getElementById('priceAvg').innerText = usedAvg > 0 ? `¥${usedAvg.toLocaleString()}` : '-';
        document.getElementById('priceLowest').innerText = usedLowest > 0 ? `¥${usedLowest.toLocaleString()}` : '-';

        document.getElementById('calcSell').value = usedLowest;
        document.getElementById('calcBuy').value = 0;
        calculateProfit(); 

        document.getElementById('linkKeepa').href = `https://keepa.com/#!product/${KEEPA_DOMAIN}-${asin}`;
        document.getElementById('linkAmz').href = `https://www.amazon.co.jp/dp/${asin}`;

        resultArea.classList.remove('hidden');

      } catch (error) {
        alert("エラーが発生しました。");
      }
    }

    function goToProVersion() {
      alert("PRO版の案内ページへジャンプします！（後でURLを差し替えます）");
    }
  </script>
</body>
</html>
